name: Security Analysis

env:
  SHARED_AUTOMATION_REPO: ThiagoGuislotti/copilot-instructions
  SHARED_AUTOMATION_REF: 69db62f81259237a38bf8f394f574b0060d49752
  SHARED_SCRIPTS_DIR: .temp/shared-scripts
  SHARED_CONSOLE_STYLE_SHA256: 97ce0e2a37fa15cc8c23d06b6afa5a7ba88f1fcaefaf50949e73869180a04e16
  SHARED_FRONTEND_AUDIT_SHA256: 0e3f9b943bd09c63f304679525ab5429395fe88c4e1c7fdc80cf9cd7f5165af5
  SHARED_PREBUILD_GATE_SHA256: a0ee604d753cd27a3192e466a1b75b33d1d4fb8a52c4b3d6c69e0d51b6c4c427

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "30 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC

  vulnerability-audit:
    name: Vulnerability Audit (Security Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download shared security scripts
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://raw.githubusercontent.com/${SHARED_AUTOMATION_REPO}/${SHARED_AUTOMATION_REF}"
          mkdir -p "${SHARED_SCRIPTS_DIR}/common" "${SHARED_SCRIPTS_DIR}/security"
          curl -fsSL "${base_url}/scripts/common/console-style.ps1" -o "${SHARED_SCRIPTS_DIR}/common/console-style.ps1"
          curl -fsSL "${base_url}/scripts/security/Invoke-FrontendPackageVulnerabilityAudit.ps1" -o "${SHARED_SCRIPTS_DIR}/security/Invoke-FrontendPackageVulnerabilityAudit.ps1"
          curl -fsSL "${base_url}/scripts/security/Invoke-PreBuildSecurityGate.ps1" -o "${SHARED_SCRIPTS_DIR}/security/Invoke-PreBuildSecurityGate.ps1"
          echo "${SHARED_CONSOLE_STYLE_SHA256}  ${SHARED_SCRIPTS_DIR}/common/console-style.ps1" | sha256sum --check --
          echo "${SHARED_FRONTEND_AUDIT_SHA256}  ${SHARED_SCRIPTS_DIR}/security/Invoke-FrontendPackageVulnerabilityAudit.ps1" | sha256sum --check --
          echo "${SHARED_PREBUILD_GATE_SHA256}  ${SHARED_SCRIPTS_DIR}/security/Invoke-PreBuildSecurityGate.ps1" | sha256sum --check --

      - name: Run security gate
        shell: pwsh
        run: |
          & "${env:SHARED_SCRIPTS_DIR}/security/Invoke-PreBuildSecurityGate.ps1" `
            -RepoRoot "${{ github.workspace }}" `
            -SkipDotnet `
            -SkipRust `
            -FailOnSeverities Critical,High `
            -FrontendPackageManager npm `
            -DetailedLogs

      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-audit-security
          path: .temp/vulnerability-audit/
          if-no-files-found: ignore
          retention-days: 30