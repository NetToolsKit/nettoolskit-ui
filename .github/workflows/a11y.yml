name: A11y Browser Gate

# Library-only browser + accessibility gate over the design-system sample
# catalog. Routine PR gating runs in GitRiver; this is the canonical home for the
# browser/a11y check (needs a real browser, so it runs in a clean Linux runner).
# Bounded to a single Chromium project to stay fast.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'src/design-system/**'
      - 'samples/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/a11y.yml'

concurrency:
  group: a11y-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  a11y:
    name: Browser + a11y (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser + a11y gate
        run: npm run test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7